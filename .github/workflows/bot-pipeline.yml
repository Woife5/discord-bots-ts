name: Bot Pipeline

on:
    workflow_call:
        inputs:
            bot-name:
                description: "Name of the bot (e.g. angry-bot)"
                required: true
                type: string
        secrets:
            DOCKER_USERNAME:
                required: true
            DOCKER_TOKEN:
                required: true

jobs:
    Lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"
            - run: pnpm install
            - name: Run biome check
              run: pnpm --filter @woife5/${{ inputs['bot-name'] }} run check 

    Typecheck:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"
            - run: pnpm install
            - name: Run typechecking
              run: pnpm --filter @woife5/${{ inputs['bot-name'] }} run typecheck

    Build:
        runs-on: ubuntu-latest
        needs: [Lint, Typecheck]
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"
            - run: pnpm install
            - name: Build
              run: pnpm --filter @woife5/${{ inputs['bot-name'] }} run build
            - name: Upload build
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ inputs['bot-name'] }}
                  path: ${{ inputs['bot-name'] }}/${{ inputs['bot-name'] }}.cjs
                  retention-days: 1

    Dockerize:
        runs-on: ubuntu-latest
        needs: [Build]
        if: github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4
            - name: Get package version
              id: package-version
              uses: martinbeentjes/npm-get-version-action@main
              with:
                  path: ${{ inputs['bot-name'] }}
            - name: Download build
              uses: actions/download-artifact@v4
              with:
                  name: ${{ inputs['bot-name'] }}
                  path: ${{ inputs['bot-name'] }}
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Build and push Docker image
              run: >
                  docker buildx build
                  -t ${{ secrets.DOCKER_USERNAME }}/${{ inputs['bot-name'] }}:${{ steps.package-version.outputs.current-version }}
                  -t ${{ secrets.DOCKER_USERNAME }}/${{ inputs['bot-name'] }}:latest
                  -f ./node.Dockerfile
                  --build-arg BOT_NAME=${{ inputs['bot-name'] }}
                  --platform=linux/arm64,linux/amd64
                  -o type=registry
                  ${{ inputs['bot-name'] }}
