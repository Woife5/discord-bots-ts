name: Copilot Bot

on:
    push:
        branches:
            - main
        paths:
            - "copilot-bot/**"
    pull_request:
        branches:
            - main
        paths:
            - "copilot-bot/**"

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version-file: copilot-bot/go.mod
            - name: Build
              run: go build -o copilot-bot ./...
              working-directory: copilot-bot
            - name: Vet
              run: go vet ./...
              working-directory: copilot-bot
            - name: Upload binary
              uses: actions/upload-artifact@v4
              with:
                  name: copilot-bot
                  path: copilot-bot/copilot-bot
                  retention-days: 1

    dockerize:
        runs-on: ubuntu-latest
        needs: [build]
        if: github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Build and push Docker image
              run: >
                  docker buildx build
                  -t ${{ secrets.DOCKER_USERNAME }}/copilot-bot:latest
                  -f ./copilot-bot/Dockerfile
                  --platform=linux/arm64,linux/amd64
                  -o type=registry
                  ./copilot-bot
