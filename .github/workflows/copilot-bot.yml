name: Copilot Bot

on:
    pull_request:
        branches:
            - main
        paths:
            - "copilot-bot/**"
    push:
        branches:
            - main
        paths:
            - "copilot-bot/**"

defaults:
    run:
        working-directory: copilot-bot

jobs:
    Lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
            - name: Run go vet
              run: go vet ./...

    Build:
        runs-on: ubuntu-latest
        needs: [Lint]
        if: github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4
            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
            - name: Build
              run: CGO_ENABLED=0 go build -ldflags="-s -w" -o copilot-bot .

    Dockerize:
        runs-on: ubuntu-latest
        needs: [Build]
        if: github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4
            - name: Get version
              id: version
              run: echo "version=$(grep 'Version' config/config.go | head -1 | sed 's/.*"\(.*\)".*/\1/')" >> $GITHUB_OUTPUT
            - name: Login to Docker Hub
              uses: docker/login-action@v1
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2
            - name: Build and upload Docker image
              run: docker buildx build -t ${{ secrets.DOCKER_USERNAME }}/copilot-bot:${{ steps.version.outputs.version }} -t ${{ secrets.DOCKER_USERNAME }}/copilot-bot:latest -f ./Dockerfile --platform=linux/arm64,linux/amd64 -o type=registry .
