name: Boller Bot

on:
    pull_request:
        branches:
            - main
        paths:
            - "boller-bot/**"
    push:
        branches:
            - main
        paths:
            - "boller-bot/**"

jobs:
    Check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version-file: boller-bot/go.mod
            - name: go vet
              run: go vet ./...
              working-directory: boller-bot

    Dockerize:
        runs-on: ubuntu-latest
        needs: [Check]
        if: github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4
            - name: Read version
              id: version
              run: echo "version=$(cat boller-bot/VERSION)" >> $GITHUB_OUTPUT
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: boller-bot
                  platforms: linux/arm64
                  push: true
                  tags: |
                      ${{ secrets.DOCKER_USERNAME }}/boller-bot:${{ steps.version.outputs.version }}
                      ${{ secrets.DOCKER_USERNAME }}/boller-bot:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
